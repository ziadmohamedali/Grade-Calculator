<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grade Calculator</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <h1>Grade Calculator</h1>

      <div class="inputGroup">
        <input type="number" id="degree" required autocomplete="off" />
        <label>Your Grade</label>
      </div>

      <button onclick="showGrade()">
        <span class="button_top">Check Grade</span>
      </button>

      <h2 id="result"></h2>
    </div>

    <script src="index.js"></script>
  </body>
</html>
